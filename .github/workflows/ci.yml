name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Rust core (DS-001, DS-005): runs on Apple Silicon (macos-14 = arm64) ----
  rust:
    name: Rust core
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (with clippy + rustfmt)
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Bench (compile only)
        # Compile-verify the Criterion harness (current + future perf benches)
        # without running measurements — perf budgets are tracked, non-blocking.
        run: cargo bench --no-run

  # ---- Swift app (DS-002, DS-006): Apple Silicon runner ----
  swift:
    name: Swift app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || true
      - name: Install Rust (for the core XCFramework)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install Swift tooling
        run: brew install swiftformat swiftlint xcodegen
      - name: Cache uniffi-bindgen-swift
        id: cache-bindgen
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen-swift
          key: uniffi-bindgen-swift-0.31.1-${{ runner.os }}
      - name: Install uniffi-bindgen-swift
        if: steps.cache-bindgen.outputs.cache-hit != 'true'
        run: cargo install uniffi --version 0.31.1 --features cli --bin uniffi-bindgen-swift
      - name: SwiftFormat (lint)
        run: swiftformat app swift --lint
      - name: SwiftLint
        run: swiftlint lint --strict
      # App build/test — the project is generated reproducibly from
      # app/Emend/project.yml; the standalone EmendTests bundle runs headless
      # (no GUI launch / signing). The core XCFramework + Swift bindings are
      # generated first (they are git-ignored build output of the Rust crate).
      - name: Build core XCFramework + Swift bindings
        run: ./scripts/build-xcframework.sh
      - name: Generate Xcode project
        run: xcodegen generate --spec app/Emend/project.yml --project app/Emend
      - name: Build & test app
        run: |
          xcodebuild test \
            -project app/Emend/Emend.xcodeproj \
            -scheme Emend \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO

  # ---- Conventional Commits (DS-007) ----
  commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR commit subjects
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          while IFS= read -r subject; do
            echo "$subject" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .+' \
              || { echo "::error::Non-conventional commit subject: $subject"; fail=1; }
          done < <(git log --format=%s "$base..$head")
          exit $fail
